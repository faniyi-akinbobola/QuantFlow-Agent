# QuantFlow Agent Evaluation Configuration
# This file configures all evaluation runs including datasets, evaluators, and thresholds

# General Configuration
project_name: "QuantFlow Stock Agent"
version: "1.0.0"
description: "Comprehensive evaluation suite for stock analysis AI agent"

# Dataset Configuration
datasets:
  rag_queries:
    path: "evals/dataset/rag_queries.json"
    description: "RAG retrieval quality tests"
    enabled: true
    sample_size: null # null = use all, or specify number for sampling

  investment_analysis:
    path: "evals/dataset/investment_analysis.json"
    description: "Complex investment analysis scenarios"
    enabled: true
    sample_size: null

  tool_usage_cases:
    path: "evals/dataset/tool_usage_cases.json"
    description: "Tool selection and usage validation"
    enabled: true
    sample_size: null

  edge_cases:
    path: "evals/dataset/edge_cases.json"
    description: "Edge cases and error handling"
    enabled: true
    sample_size: null

  out_of_scope:
    path: "evals/dataset/out_of_scope.json"
    description: "Out-of-scope query detection"
    enabled: true
    sample_size: null

  regression_suite:
    path: "evals/dataset/regression_suite.json"
    description: "Regression tests for core functionality"
    enabled: true
    sample_size: null

# Evaluator Configuration
evaluators:
  # LLM-based evaluators
  correctness:
    enabled: true
    weight: 1.0
    threshold: 80 # Minimum acceptable score (%)
    model: "gpt-4o-mini"
    temperature: 0
    applicable_to: ["investment_analysis", "rag_queries", "regression_suite"]

  faithfulness:
    enabled: true
    weight: 1.0
    threshold: 90 # High bar for hallucination prevention
    model: "gpt-4o-mini"
    temperature: 0
    applicable_to: ["rag_queries", "investment_analysis"]

  reasoning_quality:
    enabled: true
    weight: 0.8
    threshold: 75
    model: "gpt-4o-mini"
    temperature: 0
    applicable_to: ["investment_analysis", "regression_suite"]

  grounding:
    enabled: true
    weight: 1.0
    threshold: 85
    model: "gpt-4o-mini"
    temperature: 0
    applicable_to: ["rag_queries"]

  # Deterministic evaluators
  tool_usage:
    enabled: true
    weight: 1.0
    threshold: 85
    applicable_to:
      ["tool_usage_cases", "investment_analysis", "regression_suite"]

  retrieval_metrics:
    enabled: true
    weight: 1.0
    k: 5 # Top-k for retrieval metrics
    thresholds:
      recall@5: 70
      precision@5: 60
      MRR: 75
      nDCG: 70
    applicable_to: ["rag_queries"]

# Metric Configuration
metrics:
  latency:
    enabled: true
    thresholds:
      mean: 5.0 # seconds
      p95: 10.0 # seconds
      p99: 15.0 # seconds

  cost:
    enabled: true
    budget_per_query: 0.05 # USD
    total_budget: 10.0 # USD for full eval run
    track_models: true

  usage:
    enabled: true
    thresholds:
      avg_tools_per_query: 3.0
      overuse_rate: 15.0 # max % of queries using >3 tools

# Out-of-Scope Detection
out_of_scope:
  enabled: true
  threshold: 95 # % of out-of-scope queries correctly identified
  expected_response_patterns:
    - "I can only help with"
    - "not able to assist"
    - "outside my expertise"
    - "stock market"
    - "financial analysis"

# Edge Case Handling
edge_cases:
  enabled: true
  check_graceful_errors: true
  check_invalid_input_handling: true
  check_missing_data_handling: true

# Report Configuration
reporting:
  output_dir: "evals/reports"
  format: ["json", "html", "markdown"]
  include_failures: true
  include_examples: true
  max_examples_per_category: 5
  generate_charts: true

# CI/CD Integration
ci:
  fail_on_threshold_breach: true
  fail_fast: false # Continue even if one evaluator fails
  parallel_execution: true
  max_workers: 4
  timeout_per_query: 30 # seconds

# LangSmith Integration (optional)
langsmith:
  enabled: false # Set to true to enable LangSmith tracking
  project_name: "quantflow-evals"
  dataset_name: "stock-agent-eval-suite"
  tags: ["evaluation", "stock-agent", "production"]

# Sampling Strategy
sampling:
  enabled: false # Enable for faster dev cycles
  strategy: "stratified" # random, stratified, or balanced
  size: 20 # Number of samples when enabled
  seed: 42 # For reproducibility

# Advanced Settings
advanced:
  cache_llm_responses: true
  cache_dir: ".eval_cache"
  retry_on_failure: true
  max_retries: 3
  retry_delay: 2 # seconds
  parallel_llm_calls: true
  max_concurrent_llm_calls: 5
